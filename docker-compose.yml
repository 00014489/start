services:
  backend:
    build:
      context: ./mini_app/backend
    depends_on:
      - postgres
      - redis
    expose:
      - "8080"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=HisobotDb
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - REDIS_HOST=redis
    secrets:
      - postgres_password
    networks:
      - app-network

  frontend:
    build:
      context: ./mini_app/frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-network

  tg_bot:
    build:
      context: ./tg_bot
    depends_on:
      - backend
      - postgres
      - redis
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=HisobotDb
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - REDIS_HOST=redis
    secrets:
      - postgres_password
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: HisobotDb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    restart: always
    networks:
      - app-network

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge