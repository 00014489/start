services:
  api:
    build: ./MyApi
    depends_on:
      - postgres
    secrets:
      - postgres_password
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=HisobotDb
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: HisobotDb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "5432:5432"

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt